<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width: 350px;">

        <h3 class="text-center mb-3">Login</h3>

        <form id="loginForm">

            <input type="text" id="username" class="form-control mb-3" placeholder="Username">

            <input type="password" id="password" class="form-control mb-3" placeholder="Password">

            <button class="btn btn-primary w-100" type="submit">Login</button>

        </form>

        <p id="message" class="text-center mt-3"></p>

    </div>

</div>

<script>
$("#loginForm").submit(function(e){

    e.preventDefault();

    $.ajax({
        url: "https://dummyjson.com/auth/login",
        method: "POST",
        contentType: "application/json",
        data: JSON.stringify({
            username: $("#username").val(),
            password: $("#password").val()
        }),

        success: function(res){
            console.log(res);
            $("#message").css("color","green").text("Login Successful ✅");
        },

        error: function(){
            $("#message").css("color","red").text("Invalid Credentials ❌");
        }

    });

});
</script>

</body>
</html>
