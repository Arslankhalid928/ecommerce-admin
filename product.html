<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  padding-top: 56px;
  background: linear-gradient(135deg, #74ebd5, #ACB6E5);
}

.sidebar {
  position: fixed;
  top: 56px;
  left: 0;
  width: 220px;
  height: 100vh;
  background: #2c3e50;
  padding-top: 20px;
}

.sidebar a {
  display: block;
  color: white;
  padding: 12px;
  text-decoration: none;
}

.sidebar a:hover {
  background: #34495e;
}

.content {
  margin-left: 220px;
  padding: 20px;
}

footer {
  position: fixed;
  bottom: 0;
  left: 220px;
  width: calc(100% - 220px);
  background: #2c3e50;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <span class="navbar-brand">My App</span>
  </div>
</nav>

<div class="sidebar">
  <h5 class="text-white text-center">E-Commerce</h5>
</div>

<div class="content">

<div class="d-flex justify-content-between mb-3">
  <h3>Products</h3>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal">
    + Add Product
  </button>
</div>

<div class="card shadow">
  <div class="card-body">

    <table class="table table-bordered text-center">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Category</th>
          <th>Sub Category</th>
          <th>Cost</th>
          <th>Price</th>
          <th>Qty</th>
          <th>SKU</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>
    </table>

  </div>
</div>

</div>

<footer>© 2026 My App</footer>

<!-- MODAL -->
<div class="modal fade" id="productModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Product</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="editIndex">

        <div class="row">

          <div class="col-md-6 mb-2">
            <input type="text" id="name" class="form-control" placeholder="Product Name">
          </div>

          <div class="col-md-6 mb-2">
            <input type="number" id="cost" class="form-control" placeholder="Cost Price">
          </div>

          <div class="col-md-6 mb-2">
            <input type="number" id="price" class="form-control" placeholder="Price">
          </div>

          <div class="col-md-6 mb-2">
            <input type="number" id="qty" class="form-control" placeholder="Quantity">
          </div>

          <div class="col-md-6 mb-2">
            <select id="category" class="form-control">
              <option>Electronics</option>
              <option>Clothing</option>
            </select>
          </div>

          <div class="col-md-6 mb-2">
            <select id="subCategory" class="form-control">
              <option>Mobile Phones</option>
              <option>Laptops</option>
            </select>
          </div>

          <div class="col-md-6 mb-2">
            <input type="text" id="sku" class="form-control" placeholder="SKU">
          </div>

          <div class="col-md-6 mb-2">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="status">
              <label class="form-check-label">Active</label>
            </div>
          </div>

        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="saveProduct()">Save</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="product.js"></script>

</body>
</html>
