<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(to right, #2753a3, #1d6cc8);
        min-height: 100vh;
        padding-top: 70px;
        padding-bottom: 60px;
      }

      .login-box {
        max-width: 400px;
        margin: auto;
        margin-top: 50px;
        padding: 30px;
        border-radius: 15px;
        background: white;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="login-box">
        <h3 class="text-center mb-4">Login</h3>

        <form>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              placeholder="Enter email"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              placeholder="Enter password"
              required
            />
          </div>

          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" />
            <label class="form-check-label">Remember me</label>
          </div>

          <div class="d-grid justify-content-center">
            <button class="btn btn-primary w-100" type="submit">
              <a href="index.html " class="text-white text-decoration-none">Login</a>
            </button>
          </div>

          <div class="text-center mt-3">
            <a href="password.html">Forgot Password?</a><br />
            <a href="acount.html">Need an account?</a>
            <a href="acount.html">Sign Up</a>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
