<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #ddd;
            background-color: #f8f9fa;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.2);
            border-color: #764ba2;
        }

        .btn-primary {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            opacity: 0.9;
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        #message {
            font-size: 0.9rem;
            min-height: 24px;
        }

        .input-group-text {
            background-color: transparent;
            border-radius: 10px 0 0 10px;
            border-right: none;
        }

        .form-control.with-icon {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                <i class="bi bi-person-fill fs-2"></i>
            </div>
            <h2 class="card-title">Welcome Back</h2>
        </div>

        <form id="loginForm">
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" id="username" class="form-control with-icon" placeholder="Username" required>
            </div>

            <div class="input-group mb-4">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" class="form-control with-icon" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">
                SIGN IN
            </button>
        </form>

        <p id="message" class="text-center mt-2 fw-bold"></p>
        
        <div class="text-center mt-4">
            <small class="text-muted">Don't have an account? <a href="#" class="text-decoration-none" style="color: #764ba2;">Sign Up</a></small>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $("#loginForm").submit(function (e) {
            e.preventDefault();
            
            let username = $("#username").val().trim();
            let password = $("#password").val().trim();
            let $message = $("#message");

            if (!username || !password) {
                $message.css("color", "#dc3545").text("All fields required ❌");
                return;
            }

            // Button loading state
            const $btn = $(this).find('button');
            const originalText = $btn.text();
            $btn.prop('disabled', true).text('Authenticating...');

            $.ajax({
                url: "https://dummyjson.com/auth/login",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    username: username,
                    password: password,
                }),
                success: function (res) {
                    localStorage.setItem("token", res.accessToken);
                    $message.css("color", "#198754").text("Login Success! Redirecting... ✅");
                    
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1200);
                },
                error: function () {
                    $message.css("color", "#dc3545").text("Invalid Credentials ❌");
                    $btn.prop('disabled', false).text(originalText);
                }
            });
        });
    </script>
</body>
</html>
