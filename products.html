<!doctype html>
<html>
  <head>
    <title>Admin Panel CRUD</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
      body {
        background: #f4f6f9;
      }
      .sidebar {
        width: 220px;
        height: 100vh;
        position: fixed;
        background: #5db2cc;
        color: white;
        padding: 20px;
      }
      .sidebar a {
        display: block;
        color: #ccc;
        margin: 10px 0;
        text-decoration: none;
      }
      .sidebar a:hover {
        color: white;
      }
      .main {
        margin-left: 240px;
        padding: 20px;
      }
      .card-box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 10px rgba(55, 63, 65, 0.1);
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h4>Admin Panel</h4>
      <a href="category.html">Category</a>
      <a href="products.html">Products</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="main">
      <h2>Products</h2>

      <button
        class="btn btn-primary mb-3"
        data-bs-toggle="modal"
        data-bs-target="#addModal"
        
      >
        + Add Product
      </button>

      <div class="card-box">
        <table id="myTable" class="table table-striped">
          <thead class="table-info">
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Slug</th>
              <th>Price</th>
              <th>Cost</th>
              <th>SKU</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="modal fade" id="addModal">
      <div class="modal-dialog">
        <div class="modal-content p-3">
          <h4>Add Product</h4>
          <input id="addTitle" class="form-control mb-2" placeholder="Title" />
          <input id="addPrice" class="form-control mb-2" placeholder="Price" />
          <button id="addBtn" class="btn btn-success">Add</button>
        </div>
      </div>
    </div>

    <div class="modal fade" id="editModal">
      <div class="modal-dialog modal-lg">
        <div class="modal-content p-3">
          <h4>Edit Product</h4>

          <div class="row">
            <div class="col-md-6">
              <input id="editTitle" class="form-control mb-2" />
              <input id="editSlug" class="form-control mb-2" />
              <input id="editPrice" class="form-control mb-2" />
            </div>

            <div class="col-md-6">
              <input id="editCost" class="form-control mb-2" />
              <input id="editSKU" class="form-control mb-2" />
              <div class="form-check form-switch">
                <input
                  type="checkbox"
                  id="editStatus"
                  class="form-check-input"
                />
                <label>Active</label>
              </div>
            </div>
          </div>

          <button id="saveBtn" class="btn btn-success mt-3 w-100">Save</button>
        </div>
      </div>
    </div>

    <script src="product.js"></script>
  </body>
</html>
