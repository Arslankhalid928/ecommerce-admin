<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sub Category</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />

 <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


<style>
body {
  margin: 0;
  padding-top: 56px;
  background: linear-gradient(135deg, #74ebd5, #ACB6E5);
}
.navbar {
  box-shadow: 0 2px 10px rgba(36, 69, 72, 0.2);
  background: linear-gradient(135deg, #74ebd5, #ACB6E5);
}
.sidebar {
  position: fixed;
  top: 56px;
  left: 0;
  width: 220px;
  height: 100vh;
  background: linear-gradient(135deg, #74ebd5, #ACB6E5);
  padding-top: 20px;
}

.sidebar a {
  display: block;
  color: white;
  padding: 12px;
  text-decoration: none;
}

.sidebar a:hover {
  background: #34495e;
}

.content {
  margin-left: 220px;
  padding: 20px;
}

footer {
  position: fixed;
  bottom: 0;
  left: 220px;
  width: calc(100% - 220px);
  background: #2c3e50;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>
</head>

<body>

 <nav class="navbar navbar-expand-lg navbar-dark bg-info fixed-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">My App</a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#">About</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            <li class="nav-item">
              <button
                class="btn btn-sm btn-light text-danger fw-bold border"
                onclick="logout()"
              >
                <i class="bi bi-box-arrow-right me-1"></i> Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

<!-- SIDEBAR -->
<div class="sidebar">
  <h5 class="text-center text-white">E-Commerce</h5>
  <a href="#">Dashboard</a>
  <a href="category.html">Category</a>
  <a href="subcategory.html">Sub Category</a>
  <a href="products.html">Products</a>
  <a href="orders.html">Orders</a>
</div>

<!-- CONTENT -->
<div class="content">

  <div class="d-flex justify-content-between align-items-center mb-3">

    <!-- LEFT SIDE -->
    <div class="d-flex align-items-center gap-3">
      <h3 class="mb-0">Sub Category List</h3>

      <div style="width:250px;">
        <input
          type="text"
          id="customSearch"
          class="form-control"
          placeholder="Search sub categories..."
        />
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#subModal">
      + Add Sub Category
    </button>

  </div>

<div class="card shadow">
  <div class="card-body">

    <table id="dataTable" class="table table-bordered text-center">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Category</th>
          <th>Slug</th>
          <th>SKU</th>
          <th>Status</th>
          <th>Created</th>
          <th>Updated</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>
    </table>

  </div>
</div>

</div>

<!-- FOOTER -->
<footer>© 2026 My App</footer>

<!-- MODAL -->
<div class="modal fade" id="subModal">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Sub Category</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="editIndex">

        <input type="text" id="name" class="form-control mb-2" placeholder="Sub Category Name">

        <select id="category" class="form-control mb-2">
          <option>Electronics</option>
          <option>Clothing</option>
          <option>Furniture</option>
        </select>

        <input type="text" id="slug" class="form-control mb-2" placeholder="Slug">
        <input type="text" id="sku" class="form-control mb-2" placeholder="SKU">

        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="status">
          <label class="form-check-label">Active</label>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="saveSub()">Save</button>
      </div>

    </div>
  </div>
</div>


<script src="subcategory.js"></script>

</body>
</html>
